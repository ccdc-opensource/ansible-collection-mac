---
- name: Disable Siri assistant
  community.general.osx_defaults:
    domain: com.apple.assistant.support
    key: "Assistant Enabled"
    type: bool
    value: false
    state: present

- name: Hide Siri status menu
  community.general.osx_defaults:
    domain: com.apple.Siri
    key: StatusMenuVisible
    type: bool
    value: false
    state: present

- name: Disable lookup suggestions
  community.general.osx_defaults:
    domain: com.apple.lookup.shared
    key: LookupSuggestionsDisabled
    type: bool
    value: true
    state: present

- name: Disable diagnostics auto-submit
  become: true
  community.general.osx_defaults:
    domain: /Library/Preferences/com.apple.SubmitDiagInfo
    key: AutoSubmit
    type: bool
    value: false
    state: present
